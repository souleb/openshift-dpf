name: Release

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or commit SHA)"
        required: false
        default: "public-release-v26.4"
        type: string
      tag:
        description: "Version tag for images and charts (e.g. 26.4.0-abc1234). Defaults to 26.4.0-."
        required: false
        default: ""
        type: string
      dry_run:
        description: "Dry run — build only, skip push"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

env:
  SOURCE_REPO: https://github.com/NVIDIA/doca-platform.git
  REGISTRY: ghcr.io/souleb/doca-platform
  HELM_REGISTRY: oci://ghcr.io/souleb/doca-platform/charts
  CONTAINER_TOOL: docker

jobs:
  release-v26-4-1:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      UPSTREAM_REGISTRY: ghcr.io/souleb/doca-platform
      PACKAGE_SOURCES: "false"
      SOURCE_REPO_V26_4_1: https://github.com/souleb/doca-platform.git
      SOURCE_REF_V26_4_1: public-release-v26.4.1
    defaults:
      run:
        working-directory: source
    steps:
      # -----------------------------------------------------------------
      # Clone the souleb/doca-platform fork at public-release-v26.4.1
      # -----------------------------------------------------------------
      - name: Clone source repository
        run: |
          git clone "${{ env.SOURCE_REPO_V26_4_1 }}" "$GITHUB_WORKSPACE/source"
          cd "$GITHUB_WORKSPACE/source"
          git checkout "${{ env.SOURCE_REF_V26_4_1 }}"
        working-directory: ${{ github.workspace }}

      - name: Patch hostdriver MFT download retry
        run: |
          python3 - <<'PY'
          from pathlib import Path

          dockerfile = Path("source/Dockerfile.hostdriver")
          contents = dockerfile.read_text()

          old = '''RUN case ${TARGETARCH} in \\
                  amd64) ARCH=x86_64 ;; \\
                  arm64) ARCH=arm64 ;; \\
                  *) echo "Unsupported architecture: ${TARGETARCH}" && exit 1 ;; \\
              esac && \\
              curl -fsSL https://www.mellanox.com/downloads/MFT/mft-${MFT_VERSION}-${ARCH}-deb.tgz | tar -xz -C /tmp && \\
              cd /tmp/mft-${MFT_VERSION}-${ARCH}-deb && \\
              ./install.sh --without-kernel'''

          new = '''RUN case ${TARGETARCH} in \\
                  amd64) ARCH=x86_64 ;; \\
                  arm64) ARCH=arm64 ;; \\
                  *) echo "Unsupported architecture: ${TARGETARCH}" && exit 1 ;; \\
              esac && \\
              curl -fL --retry 5 --retry-delay 5 --retry-all-errors \\
                  --connect-timeout 30 --max-time 900 \\
                  -o /tmp/mft.tgz \\
                  https://www.mellanox.com/downloads/MFT/mft-${MFT_VERSION}-${ARCH}-deb.tgz && \\
              gzip -t /tmp/mft.tgz && \\
              tar -xzf /tmp/mft.tgz -C /tmp && \\
              cd /tmp/mft-${MFT_VERSION}-${ARCH}-deb && \\
              ./install.sh --without-kernel && \\
              rm -rf /tmp/mft.tgz /tmp/mft-${MFT_VERSION}-${ARCH}-deb'''

          if old not in contents:
              raise SystemExit("expected Dockerfile.hostdriver MFT block not found")

          dockerfile.write_text(contents.replace(old, new))
          PY
        working-directory: ${{ github.workspace }}

      - name: Resolve tag
        run: |
          echo "TAG=v26.4.1-beta.1" >> "$GITHUB_ENV"

      - name: Verify checkout
        run: |
          echo "Repository : ${{ env.SOURCE_REPO_V26_4_1 }}"
          echo "Ref        : ${{ env.SOURCE_REF_V26_4_1 }}"
          echo "Tag        : ${{ env.TAG }}"
          echo "Commit     : $(git rev-parse HEAD)"

      # -----------------------------------------------------------------
      # Toolchain
      # -----------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: source/go.mod
          cache-dependency-path: source/go.sum

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64
          image: tonistiigi/binfmt:qemu-v9.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache build tools and cloned repos
        uses: actions/cache@v4
        with:
          path: |
            source/hack/tools/bin
            source/hack/repos
          key: release-v26-4-1-tools-${{ runner.os }}-${{ hashFiles('source/hack/tools/tools.mk') }}
          restore-keys: |
            release-v26-4-1-tools-${{ runner.os }}-

      # -----------------------------------------------------------------
      # Build and push
      # -----------------------------------------------------------------
      - name: Build and push release
        if: ${{ !inputs.dry_run }}
        run: make release

      - name: Build only (dry run)
        if: ${{ inputs.dry_run }}
        run: make release-build

      # -----------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          DRY="${{ inputs.dry_run }}"
          echo "## Release ${{ env.TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Source: \`${{ env.SOURCE_REPO_V26_4_1 }}\` @ \`${{ env.SOURCE_REF_V26_4_1 }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$DRY" == "true" ]]; then
            echo "> **Dry run** — images and charts were built but NOT pushed." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "### Container images" >> "$GITHUB_STEP_SUMMARY"
          echo "All images pushed to \`${{ env.REGISTRY }}\` with tag \`${{ env.TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Helm charts" >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed to \`${{ env.HELM_REGISTRY }}\`" >> "$GITHUB_STEP_SUMMARY"
          ls -1 hack/charts/*.tgz 2>/dev/null | while read f; do
            echo "- \`$(basename "$f")\`" >> "$GITHUB_STEP_SUMMARY"
          done

  release:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      UPSTREAM_REGISTRY: ghcr.io/souleb/doca-platform
      PACKAGE_SOURCES: "false"
    defaults:
      run:
        working-directory: source
    steps:
      # -----------------------------------------------------------------
      # Clone the public source repository at the requested tag
      # -----------------------------------------------------------------
      - name: Clone source repository
        run: |
          git clone "${{ env.SOURCE_REPO }}" "$GITHUB_WORKSPACE/source"
          cd "$GITHUB_WORKSPACE/source"
          git checkout "${{ inputs.ref || 'public-release-v26.4' }}"
        working-directory: ${{ github.workspace }}

      - name: Patch hostdriver MFT download retry
        run: |
          python3 - <<'PY'
          from pathlib import Path

          dockerfile = Path("source/Dockerfile.hostdriver")
          contents = dockerfile.read_text()

          old = '''RUN case ${TARGETARCH} in \\
                  amd64) ARCH=x86_64 ;; \\
                  arm64) ARCH=arm64 ;; \\
                  *) echo "Unsupported architecture: ${TARGETARCH}" && exit 1 ;; \\
              esac && \\
              curl -fsSL https://www.mellanox.com/downloads/MFT/mft-${MFT_VERSION}-${ARCH}-deb.tgz | tar -xz -C /tmp && \\
              cd /tmp/mft-${MFT_VERSION}-${ARCH}-deb && \\
              ./install.sh --without-kernel'''

          new = '''RUN case ${TARGETARCH} in \\
                  amd64) ARCH=x86_64 ;; \\
                  arm64) ARCH=arm64 ;; \\
                  *) echo "Unsupported architecture: ${TARGETARCH}" && exit 1 ;; \\
              esac && \\
              curl -fL --retry 5 --retry-delay 5 --retry-all-errors \\
                  --connect-timeout 30 --max-time 900 \\
                  -o /tmp/mft.tgz \\
                  https://www.mellanox.com/downloads/MFT/mft-${MFT_VERSION}-${ARCH}-deb.tgz && \\
              gzip -t /tmp/mft.tgz && \\
              tar -xzf /tmp/mft.tgz -C /tmp && \\
              cd /tmp/mft-${MFT_VERSION}-${ARCH}-deb && \\
              ./install.sh --without-kernel && \\
              rm -rf /tmp/mft.tgz /tmp/mft-${MFT_VERSION}-${ARCH}-deb'''

          if old not in contents:
              raise SystemExit("expected Dockerfile.hostdriver MFT block not found")

          dockerfile.write_text(contents.replace(old, new))
          PY
        working-directory: ${{ github.workspace }}

      - name: Resolve tag
        run: |
          INPUT_TAG="${{ inputs.tag }}"
          if [[ -n "${INPUT_TAG}" ]]; then
            echo "TAG=${INPUT_TAG}" >> "$GITHUB_ENV"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "TAG=26.4.0-${SHORT_SHA}" >> "$GITHUB_ENV"
          fi

      - name: Verify checkout
        run: |
          echo "Repository : ${{ env.SOURCE_REPO }}"
          echo "Ref        : ${{ inputs.ref || 'public-release-v26.4' }}"
          echo "Tag        : ${{ env.TAG }}"
          echo "Commit     : $(git rev-parse HEAD)"

      # -----------------------------------------------------------------
      # Toolchain
      # -----------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: source/go.mod
          cache-dependency-path: source/go.sum

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64
          image: tonistiigi/binfmt:qemu-v9.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Makefile installs tools into hack/tools/bin via tools.mk;
      # caching avoids re-downloading on every run.
      - name: Cache build tools and cloned repos
        uses: actions/cache@v4
        with:
          path: |
            source/hack/tools/bin
            source/hack/repos
          key: release-tools-${{ runner.os }}-${{ hashFiles('source/hack/tools/tools.mk') }}
          restore-keys: |
            release-tools-${{ runner.os }}-

      # -----------------------------------------------------------------
      # Build and push
      # -----------------------------------------------------------------
      - name: Build and push release
        if: ${{ !inputs.dry_run }}
        run: make release

      - name: Build only (dry run)
        if: ${{ inputs.dry_run }}
        run: make release-build

      # -----------------------------------------------------------------
      # Summary
      # -----------------------------------------------------------------
      - name: Summary
        if: always()
        run: |
          DRY="${{ inputs.dry_run }}"
          echo "## Release ${{ env.TAG }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Source: \`${{ env.SOURCE_REPO }}\` @ \`${{ inputs.ref || 'public-release-v26.4' }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$DRY" == "true" ]]; then
            echo "> **Dry run** — images and charts were built but NOT pushed." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "### Container images" >> "$GITHUB_STEP_SUMMARY"
          echo "All images pushed to \`${{ env.REGISTRY }}\` with tag \`${{ env.TAG }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Helm charts" >> "$GITHUB_STEP_SUMMARY"
          echo "Pushed to \`${{ env.HELM_REGISTRY }}\`" >> "$GITHUB_STEP_SUMMARY"
          ls -1 hack/charts/*.tgz 2>/dev/null | while read f; do
            echo "- \`$(basename "$f")\`" >> "$GITHUB_STEP_SUMMARY"
          done
