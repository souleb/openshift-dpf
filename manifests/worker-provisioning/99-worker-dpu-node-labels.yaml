apiVersion: machineconfiguration.openshift.io/v1
kind: MachineConfig
metadata:
  labels:
    machineconfiguration.openshift.io/role: <WORKER_ROLE>
  name: 99-worker-dpu-node-labels
spec:
  config:
    ignition:
      version: 3.2.0
    storage:
      files:
      - path: /etc/kubernetes/kubelet-env
        mode: 0644
        overwrite: true
        contents:
          source: data:text/plain;charset=utf-8;base64,<KUBELET_ENV_BASE64>
