---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpf-host-kube-state-metrics
  namespace: dpf-operator-system
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/instance: dpf-host-kube-state-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-state-metrics
      app.kubernetes.io/instance: dpf-host-kube-state-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-state-metrics
        app.kubernetes.io/instance: dpf-host-kube-state-metrics
    spec:
      serviceAccountName: dpf-host-kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.18.0
          imagePullPolicy: IfNotPresent
          args:
            - --custom-resource-state-config-file=/etc/customresourcestate/config.yaml
            - --custom-resource-state-only=true
            - --port=8080
            - --telemetry-port=8081
          ports:
            - name: http-metrics
              containerPort: 8080
              protocol: TCP
            - name: telemetry
              containerPort: 8081
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: customresourcestate-config
              mountPath: /etc/customresourcestate
              readOnly: true
      volumes:
        - name: customresourcestate-config
          configMap:
            name: dpf-operator-customresourcestate-config
            defaultMode: 420
---
apiVersion: v1
kind: Service
metadata:
  name: dpf-host-kube-state-metrics
  namespace: dpf-operator-system
  labels:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/instance: dpf-host-kube-state-metrics
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app.kubernetes.io/name: kube-state-metrics
    app.kubernetes.io/instance: dpf-host-kube-state-metrics
  ports:
    - name: http-metrics
      port: 8080
      targetPort: http-metrics
      protocol: TCP
    - name: telemetry
      port: 8081
      targetPort: telemetry
      protocol: TCP
